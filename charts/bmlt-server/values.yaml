# Default values for bmlt-server.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: bmltenabled/bmlt-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion. Set to
  # "latest" to always track the newest published image.
  tag: ""

bmlt:
  aggregatorMode:
    enabled: true
    schedule: "0 */2 * * *"
  # Google Maps API key, exposed to the app as GOOGLE_API_KEY.
  googleApiKey: ""
  secrets: {}
    # googleApiKey:
    #   name: "google-creds"
    #   key: "google-key"

database:
  host: "mysql.bmlt.svc.cluster.local"
  port: 3306
  name: rootserver
  username: rootserver
  password: rootserver
  # Table prefix, exposed as DB_PREFIX (defaults to "na" when unset).
  dbprefix: "na"
  secrets: {}
    # username:
    #   name: "database-creds"
    #   key: "db-admin-user"
    # password:
    #   name: "database-creds"
    #   key: "db-admin-password"

# Extra environment variables passed verbatim to the server and aggregator
# containers, e.g. MEETING_STATES_AND_PROVINCES, ENABLE_LANGUAGE_SELECTOR,
# AGGREGATOR_USER_AGENT.
extraEnv: []
  # - name: ENABLE_LANGUAGE_SELECTOR
  #   value: "true"
  # - name: MEETING_STATES_AND_PROVINCES
  #   value: "CT,MA,NH,NJ,NY,PA,VT"

service:
  type: NodePort
  # This is external port
  port: 8000
  nodePort: 30288

ingress:
  enabled: true
  className: "alb"
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: instance
    alb.ingress.kubernetes.io/subnets: "subnet-1234, subnet-5678"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: "<ACM ARN>"
  hosts:
    - host: bmlt.mydomain.org
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local


imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
