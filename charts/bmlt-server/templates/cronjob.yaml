{{- if .Values.bmlt.aggregatorMode.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "bmlt-server.fullname" . }}-aggregator-import
  labels:
    {{- include "bmlt-server.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.bmlt.aggregatorMode.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "bmlt-server.selectorLabels" . | nindent 12 }}
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          initContainers:
            - name: aggregator-init
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - php
                - /var/www/html/main_server/artisan
                - aggregator:InitializeDatabase
              env:
                {{- include "bmlt-server.env" . | nindent 16 }}
          containers:
            - name: aggregator-import
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - php
                - /var/www/html/main_server/artisan
                - aggregator:ImportRootServers
              env:
                {{- include "bmlt-server.env" . | nindent 16 }}
          restartPolicy: OnFailure
{{- end }}
